<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compare · Life Choices</title>
  <script type="module">
    import { injectTailwindConfig, navHtml, pageShell } from './app/layout.js';
    import { loadPvqResult } from './app/storage.js';
    import { valueDimensions, DIM_META } from './app/constants.js';
    import { fmt, htmlEscape, copyToClipboard, downloadText, clamp } from './app/ui.js';
    injectTailwindConfig();
    window.__pageShell = pageShell;
    window.__loadPvqResult = loadPvqResult;
    window.__valueDimensions = valueDimensions;
    window.__DIM_META = DIM_META;
    window.__fmt = fmt;
    window.__esc = htmlEscape;
    window.__copy = copyToClipboard;
    window.__download = downloadText;
    window.__clamp = clamp;
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-bg text-text font-serif">
  <div id="app"></div>

  <script type="module">
    import * as util from './app/utility.js';
    import { buildValueProfileFromPvqResult, buildCompareSessionExport } from './app/schemas.js';
    import { loadUserContext } from './app/storage.js';

    const pvq = window.__loadPvqResult();
    if (!pvq) {
      document.getElementById('app').innerHTML = window.__pageShell({
        active: 'compare',
        subtitle: 'Compare',
        title: '先完成 PVQ-40',
        bodyHtml: `
          <div class="rounded-2xl border border-border bg-surface p-6 shadow-card">
            <div class="text-sm leading-7 text-text2">
              Compare 需要你的 <span class="font-mono text-text">w_i</span>。请先完成问卷并保存结果。
            </div>
            <div class="mt-5 flex gap-3">
              <a class="rounded-lg bg-accent px-5 py-3 font-semibold text-bg hover:opacity-90 transition" href="pvq40.html">去做问卷 →</a>
              <a class="rounded-lg border border-border bg-surface2 px-5 py-3 text-text hover:bg-surface transition" href="index.html">回首页</a>
            </div>
          </div>
        `,
      });
      throw new Error('No PVQ result');
    }

    const w = pvq.w_i.map(Number);
    const profile = buildValueProfileFromPvqResult(pvq);
    const userContext = loadUserContext();
    const dimIds = window.__valueDimensions;
    const dimLabels = dimIds.map(id => window.__DIM_META[id].shortEn);

    // choice structure: { id, name, tag, v:[10] 1..10, effort:1..10 }
    const PRESET = [
      { name: '换一份更有挑战的工作', tag: 'career', v: [7,7,3,8,5,4,3,2,2,3], effort: 8 },
      { name: '报名一个系统课程深度学习', tag: 'learning', v: [9,4,2,8,3,5,4,2,2,4], effort: 7 },
      { name: '每周固定运动 3 次', tag: 'health', v: [6,5,3,7,3,8,6,3,2,3], effort: 7 },
      { name: '把更多时间给亲密关系/家庭', tag: 'relationship', v: [4,2,5,3,2,7,6,6,8,4], effort: 5 },
    ];

    let choices = PRESET.map((c, i) => ({ ...c, id: `compare_preset_${i}`, v: [...c.v] }));

    // c_i: 0..1, higher means more cost sensitive
    let ci = 0.45;

    function computeChoice(choice) {
      return util.computeUtility(w, ci, choice.v, choice.effort);
    }

    function contributorSummary(perDim, n = 3) {
      return util.rankContributors(perDim, n, dimIds)
        .map(t => {
          const zh = window.__DIM_META[t.dimensionId].zh;
          const x = t.contribution;
          return `${zh}(${x >= 0 ? '+' : ''}${x.toFixed(1)})`;
        })
        .join(' · ');
    }

    function palette(idx) {
      const colors = ['#c8a96e', '#8fb8a0', '#8aa4ff', '#d48a8a', '#b38ad4', '#7fc7c7'];
      return colors[idx % colors.length];
    }

    function render() {
      const computed = choices.map(c => ({ ...c, _r: computeChoice(c) }));
      const sorted = [...computed].sort((a, b) => b._r.net - a._r.net);
      const maxAbsNet = Math.max(...computed.map(x => Math.abs(x._r.net))) || 1;

      const body = `
        <div class="grid gap-6 lg:grid-cols-5">
          <div class="lg:col-span-3 grid gap-6">
            <div class="rounded-2xl border border-border bg-surface p-6 shadow-card">
              <div class="flex items-start justify-between gap-4">
                <div>
                  <div class="font-mono text-[11px] tracking-[0.18em] uppercase text-text3">Cost sensitivity</div>
                  <div class="mt-2 text-sm text-text2">
                    c_i 控制 effort 的惩罚强度（越高越“怕累/怕成本”）。
                  </div>
                </div>
                <div class="text-right">
                  <div class="font-mono text-[11px] text-text3">c_i</div>
                  <div class="font-mono text-lg text-accent">${window.__fmt(ci, 3)}</div>
                </div>
              </div>
              <div class="mt-5">
                <input id="ci" type="range" min="0" max="1" step="0.01" value="${ci}" class="w-full">
                <div class="mt-2 flex justify-between text-[11px] font-mono text-text3">
                  <span>0.00（几乎不计成本）</span>
                  <span>1.00（非常计成本）</span>
                </div>
              </div>
            </div>

            <div class="rounded-2xl border border-border bg-surface p-6 shadow-card">
              <div class="flex items-center justify-between gap-4">
                <div>
                  <div class="font-mono text-[11px] tracking-[0.18em] uppercase text-text3">Choices</div>
                  <div class="mt-2 text-sm text-text2">编辑每个 choice 的 v(x) 与 effort，然后系统实时比较 U_i(x)。</div>
                </div>
                <button id="addChoice" class="rounded-lg bg-accent2 px-4 py-2 text-xs font-semibold text-bg hover:opacity-90 transition">+ Add</button>
              </div>

              <div class="mt-5 grid gap-4" id="choices"></div>
            </div>
          </div>

          <div class="lg:col-span-2 grid gap-6">
            <div class="rounded-2xl border border-border bg-surface p-6 shadow-card">
              <div class="font-mono text-[11px] tracking-[0.18em] uppercase text-text3">Radar comparison</div>
              <div class="mt-2 text-sm text-text2">多 choice 的 v(x)（1-10）叠加对比。</div>
              <div class="mt-4">
                <canvas id="radar" height="280"></canvas>
              </div>
            </div>

            <div class="rounded-2xl border border-border bg-surface p-6 shadow-card">
              <div class="flex items-center justify-between gap-3">
                <div>
                  <div class="font-mono text-[11px] tracking-[0.18em] uppercase text-text3">Ranking</div>
                  <div class="mt-2 text-sm text-text2">按 U_i(x) 从高到低排序。</div>
                </div>
                <div class="flex gap-2">
                  <button id="copyOut" class="rounded-lg border border-border bg-surface2 px-3 py-2 text-xs font-mono text-text2 hover:bg-surface transition">Copy</button>
                  <button id="dlOut" class="rounded-lg border border-border bg-surface2 px-3 py-2 text-xs font-mono text-text2 hover:bg-surface transition">Download</button>
                </div>
              </div>
              <div class="mt-4 grid gap-3">
                ${sorted.map((c, idx) => {
                  const isPos = c._r.net >= 0;
                  const pct = Math.abs(c._r.net) / maxAbsNet * 100;
                  const top = contributorSummary(c._r.perDimensionContributions, 3);
                  return `
                    <div class="rounded-xl border border-border bg-surface2 p-4">
                      <div class="flex items-start justify-between gap-3">
                        <div>
                          <div class="text-sm font-semibold">#${idx+1} ${window.__esc(c.name)}</div>
                          <div class="mt-1 text-xs font-mono text-text3">${window.__esc(c.tag || '')}</div>
                          <div class="mt-2 text-xs text-text2 leading-6">Top contributors: ${window.__esc(top)}</div>
                        </div>
                        <div class="text-right">
                          <div class="font-mono text-[11px] text-text3">U_i(x)</div>
                          <div class="font-mono text-lg ${isPos ? 'text-accent2' : 'text-danger'}">${isPos?'+':''}${c._r.net.toFixed(2)}</div>
                        </div>
                      </div>
                      <div class="mt-3 h-2 rounded-full bg-border/70">
                        <div class="h-2 rounded-full ${isPos ? 'bg-accent2' : 'bg-danger'}" style="width:${pct}%"></div>
                      </div>
                      <div class="mt-2 flex justify-between text-[11px] font-mono text-text3">
                        <span>benefit ${c._r.benefit.toFixed(1)}</span>
                        <span>cost ${c._r.cost.toFixed(1)}</span>
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
              <pre id="out" class="mt-4 rounded-xl border border-border bg-surface2 p-4 text-[11px] leading-6 font-mono text-accent2 overflow-auto"></pre>
            </div>
          </div>
        </div>
      `;

      document.getElementById('app').innerHTML = window.__pageShell({
        active: 'compare',
        subtitle: 'Step 4 · Life Choice Comparison',
        title: '选择对比 · Compare choices',
        bodyHtml: body,
      });

      // bind ci
      document.getElementById('ci').addEventListener('input', (e) => {
        ci = Number(e.target.value);
        render();
      });

      // render choices editor
      const list = document.getElementById('choices');
      computed.forEach((c, idx) => {
        const card = document.createElement('div');
        card.className = 'rounded-2xl border border-border bg-surface2 p-5';
        const isPos = c._r.net >= 0;
        card.innerHTML = `
          <div class="flex items-start justify-between gap-4">
            <div class="flex-1">
              <div class="grid gap-3 md:grid-cols-2">
                <div>
                  <div class="text-xs font-mono text-text3">Name</div>
                  <input data-k="name" data-i="${idx}" value="${window.__esc(c.name)}"
                    class="mt-2 w-full rounded-lg border border-border bg-bg/40 px-3 py-2 text-sm outline-none focus:border-accent" />
                </div>
                <div>
                  <div class="text-xs font-mono text-text3">Tag</div>
                  <input data-k="tag" data-i="${idx}" value="${window.__esc(c.tag || '')}"
                    class="mt-2 w-full rounded-lg border border-border bg-bg/40 px-3 py-2 text-sm outline-none focus:border-accent" />
                </div>
              </div>
              <div class="mt-4 grid grid-cols-2 gap-3 sm:grid-cols-3">
                ${dimIds.map((id, d) => `
                  <div class="rounded-xl border border-border bg-bg/30 p-3">
                    <div class="flex items-center justify-between">
                      <div class="text-[11px] font-mono text-text3">${window.__esc(window.__DIM_META[id].shortEn)}</div>
                      <div class="text-xs font-mono text-accent">${c.v[d]}</div>
                    </div>
                    <input data-k="v" data-i="${idx}" data-d="${d}" type="range" min="1" max="10" step="1" value="${c.v[d]}" class="mt-2 w-full" />
                  </div>
                `).join('')}
              </div>
              <div class="mt-4 rounded-xl border border-border bg-bg/30 p-3">
                <div class="flex items-center justify-between">
                  <div class="text-[11px] font-mono text-danger">effort(x)</div>
                  <div class="text-xs font-mono text-danger">${c.effort}</div>
                </div>
                <input data-k="effort" data-i="${idx}" type="range" min="1" max="10" step="1" value="${c.effort}" class="mt-2 w-full" />
              </div>
            </div>
            <div class="text-right">
              <div class="font-mono text-[11px] text-text3">U_i(x)</div>
              <div class="font-mono text-xl ${isPos ? 'text-accent2' : 'text-danger'}">${isPos?'+':''}${c._r.net.toFixed(2)}</div>
              <button data-k="remove" data-i="${idx}" class="mt-3 rounded-lg border border-border bg-bg/30 px-3 py-2 text-xs font-mono text-text2 hover:bg-bg/50 transition">Remove</button>
            </div>
          </div>
        `;
        list.appendChild(card);
      });

      // bind editors
      list.querySelectorAll('input[data-k="name"], input[data-k="tag"]').forEach(inp => {
        inp.addEventListener('input', () => {
          const i = Number(inp.dataset.i);
          const k = inp.dataset.k;
          choices[i][k] = inp.value;
        });
      });
      list.querySelectorAll('input[type="range"][data-k="v"]').forEach(r => {
        r.addEventListener('input', () => {
          const i = Number(r.dataset.i);
          const d = Number(r.dataset.d);
          choices[i].v[d] = Number(r.value);
          render();
        });
      });
      list.querySelectorAll('input[type="range"][data-k="effort"]').forEach(r => {
        r.addEventListener('input', () => {
          const i = Number(r.dataset.i);
          choices[i].effort = Number(r.value);
          render();
        });
      });
      list.querySelectorAll('button[data-k="remove"]').forEach(b => {
        b.addEventListener('click', () => {
          const i = Number(b.dataset.i);
          choices.splice(i, 1);
          render();
        });
      });

      document.getElementById('addChoice').onclick = () => {
        choices.push({ id: `compare_${Date.now()}`, name: '新选择', tag: 'custom', v: new Array(10).fill(5), effort: 5 });
        render();
      };

      // chart
      const radarCtx = document.getElementById('radar');
      const chart = new window.Chart(radarCtx, {
        type: 'radar',
        data: {
          labels: dimLabels,
          datasets: choices.map((c, idx) => ({
            label: c.name,
            data: c.v,
            borderColor: palette(idx),
            backgroundColor: palette(idx) + '22',
            borderWidth: 2,
            pointRadius: 1.5,
          })),
        },
        options: {
          responsive: true,
          plugins: { legend: { labels: { color: '#a7b0bf', font: { size: 11 } } } },
          scales: {
            r: {
              min: 0,
              max: 10,
              ticks: { display: false },
              grid: { color: 'rgba(39,48,66,0.7)' },
              angleLines: { color: 'rgba(39,48,66,0.7)' },
              pointLabels: { color: '#a7b0bf', font: { size: 11 } },
            }
          }
        }
      });
      void chart;

      // export output
      const rankingRows = sorted.map((row, idx) => ({
        rank: idx + 1,
        choiceId: row.id,
        name: row.name,
        tag: row.tag,
        utility: {
          U_i: Number(row._r.net.toFixed(4)),
          benefit: Number(row._r.benefit.toFixed(4)),
          cost: Number(row._r.cost.toFixed(4)),
        },
        topContributors: util.rankContributors(row._r.perDimensionContributions, 3, dimIds),
      }));

      const exportObj = buildCompareSessionExport({
        profile,
        userContext: userContext || null,
        utilityParams: {
          c_i: ci,
          c_i_mode: 'continuous_0_1',
          formula: 'U_i(x)=dot(w_i,v(x))-c_i*effort(x)',
        },
        choicesRaw: choices,
        rankingRows,
      });
      const exportJson = JSON.stringify(exportObj, null, 2);
      document.getElementById('out').textContent = exportJson;
      document.getElementById('copyOut').onclick = async () => {
        await window.__copy(exportJson);
        document.getElementById('copyOut').textContent = 'Copied';
        setTimeout(() => (document.getElementById('copyOut').textContent = 'Copy'), 1200);
      };
      document.getElementById('dlOut').onclick = () => window.__download('compare_output.json', exportJson);
    }

    render();
  </script>
</body>
</html>
